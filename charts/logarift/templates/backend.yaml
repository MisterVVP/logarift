apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "logarift.fullname" . }}-backend
  labels:
    {{- include "logarift.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "logarift.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "logarift.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
        {{- with .Values.backend.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.backend.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "logarift.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: backend
          image: {{ include "logarift.image" (dict "root" . "image" .Values.backend.image) }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: {{ include "logarift.fullname" . }}-config
          env:
            - name: LOGARIFT_MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-connection" (include "logarift.fullname" .)) .Values.mongodb.external.existingSecret }}
                  key: {{ ternary .Values.mongodb.external.existingSecretKey "mongodb-uri" (ne .Values.mongodb.external.existingSecret "") }}
            - name: LOGARIFT_VALKEY_URL
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-connection" (include "logarift.fullname" .)) .Values.valkey.external.existingSecret }}
                  key: {{ ternary .Values.valkey.external.existingSecretKey "valkey-url" (ne .Values.valkey.external.existingSecret "") }}
            {{- range $name, $value := .Values.backend.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
            {{- with .Values.backend.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: uploads
              mountPath: /var/lib/logarift/uploads
            - name: exports
              mountPath: /var/lib/logarift/exports
          {{- with .Values.backend.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.backend.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.backend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: uploads
          {{- if .Values.backend.persistence.uploads.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "logarift.fullname" . }}-uploads
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: exports
          {{- if .Values.backend.persistence.exports.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "logarift.fullname" . }}-exports
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- include "logarift.podScheduling" .Values.backend | nindent 6 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "logarift.fullname" . }}-backend
  labels:
    {{- include "logarift.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
  selector:
    {{- include "logarift.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
{{- if .Values.backend.podDisruptionBudget.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "logarift.fullname" . }}-backend
  labels:
    {{- include "logarift.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  minAvailable: {{ .Values.backend.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "logarift.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
{{- end }}
