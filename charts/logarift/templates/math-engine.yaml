apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "logarift.fullname" . }}-math-engine
  labels:
    {{- include "logarift.labels" . | nindent 4 }}
    app.kubernetes.io/component: math-engine
spec:
  replicas: {{ .Values.mathEngine.replicaCount }}
  selector:
    matchLabels:
      {{- include "logarift.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: math-engine
  template:
    metadata:
      labels:
        {{- include "logarift.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: math-engine
        {{- with .Values.mathEngine.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.mathEngine.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "logarift.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: math-engine
          image: {{ include "logarift.image" (dict "root" . "image" .Values.mathEngine.image) }}
          imagePullPolicy: {{ .Values.mathEngine.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8090
          env:
            - name: LOGARIFT_MATH_ENGINE_PORT
              value: "8090"
            {{- range $name, $value := .Values.mathEngine.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
            {{- with .Values.mathEngine.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.mathEngine.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.mathEngine.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.mathEngine.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- include "logarift.podScheduling" .Values.mathEngine | nindent 6 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "logarift.fullname" . }}-math-engine
  labels:
    {{- include "logarift.labels" . | nindent 4 }}
    app.kubernetes.io/component: math-engine
spec:
  type: {{ .Values.mathEngine.service.type }}
  ports:
    - name: http
      port: {{ .Values.mathEngine.service.port }}
      targetPort: http
  selector:
    {{- include "logarift.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: math-engine
