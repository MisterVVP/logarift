gateway:
  enabled: true

httpRoute:
  parentRefs:
    - name: traefik-gateway
      namespace: ingress

  hostnames:
    - logarift.local

backend:
  persistence:
    uploads:
      storageClassName: microk8s-hostpath
    exports:
      storageClassName: microk8s-hostpath

frontend:
  extraEnv:
    - name: __VITE_ADDITIONAL_SERVER_ALLOWED_HOSTS
      value: logarift.local

mongodb:
  persistence:
    storageClassName: microk8s-hostpath

valkey:
  persistence:
    storageClassName: microk8s-hostpath

ollama:
  enabled: true
  persistence:
    storageClassName: microk8s-hostpath

llmAdapter:
  enabled: true
  deploy: true
  model: logarift-enricher-qwen3-8b
  timeoutMS: 60000
  minConfidence: "0.70"
  promptPrivacyMode: text_only
  allowRemoteRuntime: true
