gateway:
  enabled: true

httpRoute:
  parentRefs:
    - name: traefik-gateway
      namespace: ingress

  hostnames:
    - logarift.local

backend:
  persistence:
    uploads:
      storageClassName: microk8s-hostpath
    exports:
      storageClassName: microk8s-hostpath

frontend:
  extraEnv:
    - name: __VITE_ADDITIONAL_SERVER_ALLOWED_HOSTS
      value: logarift.local

mongodb:
  persistence:
    storageClassName: microk8s-hostpath

valkey:
  persistence:
    storageClassName: microk8s-hostpath

ollama:
  enabled: true
  persistence:
    storageClassName: microk8s-hostpath

llmAdapter:
  enabled: true
  deploy: true
  model: logarift-enricher-qwen3-8b
  timeoutMS: 60000
  minConfidence: "0.70"
  promptPrivacyMode: text_only
  allowRemoteRuntime: true

# GPU acceleration examples for chart-managed Ollama are intentionally kept
# disabled here so the default local install remains CPU-only and portable.
#
# AMD RX 6900 XT / ROCm local testing:
#   microk8s helm3 upgrade --install logarift charts/logarift \
#     --create-namespace --namespace logarift \
#     --values charts/logarift/values.local.yaml \
#     --values charts/logarift/examples/values.local-amd-rocm.yaml
#
# NVIDIA local testing with the NVIDIA device plugin installed:
#   microk8s helm3 upgrade --install logarift charts/logarift \
#     --create-namespace --namespace logarift \
#     --values charts/logarift/values.local.yaml \
#     --values charts/logarift/examples/values.local-nvidia.yaml
