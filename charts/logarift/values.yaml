# nameOverride -- Override the chart name.
nameOverride: ""
# fullnameOverride -- Override the fully qualified release name.
fullnameOverride: ""

# imagePullSecrets -- Optional image pull secrets for private registries.
imagePullSecrets: []

# clusterDomain -- Kubernetes cluster DNS domain used for default in-cluster service URLs.
clusterDomain: cluster.local

serviceAccount:
  # serviceAccount.create -- Create a dedicated service account.
  create: true
  # serviceAccount.name -- Existing service account name when create=false.
  name: ""
  # serviceAccount.annotations -- Extra service account annotations.
  annotations: {}

podSecurityContext: {}

# securityContext -- App container security defaults. Dropping all Linux capabilities is safe for Logarift app containers because they run on unprivileged ports and do not need kernel-level privileges.
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: false

backend:
  replicaCount: 1
  image:
    repository: ghcr.io/mistervvp/logarift-api
    tag: "latest"
    digest: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  env: {}
  extraEnv: []
  resources: {}
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  persistence:
    uploads:
      enabled: true
      size: 5Gi
      storageClassName: ""
      accessModes: ["ReadWriteOnce"]
    exports:
      enabled: true
      size: 1Gi
      storageClassName: ""
      accessModes: ["ReadWriteOnce"]
  livenessProbe:
    httpGet:
      path: /health/live
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /health/ready
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
  podDisruptionBudget:
    enabled: false
    minAvailable: 1

frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/mistervvp/logarift-frontend
    tag: "latest"
    digest: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 5173
  # frontend.apiBaseURL -- Browser-facing API base URL. Empty uses same origin, useful behind one Gateway API host.
  apiBaseURL: ""
  env: {}
  extraEnv: []
  resources: {}
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10

mathEngine:
  replicaCount: 1
  image:
    repository: ghcr.io/mistervvp/logarift-math-engine
    tag: "latest"
    digest: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8090
  env: {}
  extraEnv: []
  resources: {}
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  livenessProbe:
    httpGet:
      path: /health/live
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /health/ready
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10

llmAdapter:
  # llmAdapter.enabled -- Enable backend LLM enrichment integration.
  enabled: false
  # llmAdapter.deploy -- Deploy the adapter in this release. Set false with backendURL for an existing in-cluster adapter service.
  deploy: true
  replicaCount: 1
  image:
    repository: ghcr.io/mistervvp/logarift-llm-adapter
    tag: "latest"
    digest: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8091
  # backendURL -- Backend-facing adapter URL. Empty uses the chart-managed Service DNS name in the release namespace.
  backendURL: ""
  # ollamaURL -- Adapter-facing Ollama-compatible runtime URL. Empty uses the chart-managed Ollama Service DNS name when ollama.enabled=true.
  ollamaURL: ""
  model: logarift-enricher-qwen3-8b
  timeoutMS: 15000
  minConfidence: "0.70"
  promptPrivacyMode: text_only
  allowRemoteRuntime: false
  env: {}
  extraEnv: []
  resources: {}
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []

ollama:
  # ollama.enabled -- Deploy an in-cluster Ollama runtime for the LLM adapter.
  enabled: false
  replicaCount: 1
  image:
    repository: ollama/ollama
    tag: "latest"
    digest: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 11434
  persistence:
    enabled: true
    size: 30Gi
    storageClassName: ""
    accessModes: ["ReadWriteOnce"]
  modelInit:
    # ollama.modelInit.enabled -- Pull the base model and create the Logarift model alias before Ollama starts.
    enabled: true
    baseModel: qwen3:8b
    model: logarift-enricher-qwen3-8b
    # ollama.modelInit.modelfile -- Optional inline Modelfile override. Empty uses files/ollama/logarift-enricher-qwen3-8b.Modelfile.
    modelfile: ""
  env: {}
  extraEnv: []
  acceleration:
    # ollama.acceleration.type -- GPU acceleration mode for chart-managed Ollama. Supported values: none, amd, nvidia.
    type: none
    # ollama.acceleration.gpuCount -- Number of GPUs requested when using device-plugin based scheduling.
    gpuCount: 1
    # ollama.acceleration.runtimeClassName -- Optional RuntimeClass for GPU runtimes that require one. Applied only to the Ollama pod in GPU modes.
    runtimeClassName: ""
    # ollama.acceleration.nodeSelector -- Extra node selector entries for GPU nodes. Merged into ollama.nodeSelector in GPU modes.
    nodeSelector: {}
    # ollama.acceleration.tolerations -- Extra tolerations for GPU nodes. Appended to ollama.tolerations in GPU modes.
    tolerations: []
    # ollama.acceleration.extraEnv -- Extra environment variables applied only to the Ollama container in GPU modes.
    extraEnv: []
    amd:
      # ollama.acceleration.amd.imageTag -- Recommended ROCm-capable Ollama tag. Set ollama.image.tag explicitly to use it.
      imageTag: rocm
      hostDevices:
        # ollama.acceleration.amd.hostDevices.enabled -- Mount /dev/kfd and /dev/dri from the host for simple local AMD GPU access.
        enabled: false
        # ollama.acceleration.amd.hostDevices.privileged -- Set privileged=true on only the Ollama container when host devices are mounted.
        privileged: true
        kfdPath: /dev/kfd
        driPath: /dev/dri
      # ollama.acceleration.amd.hsaOverrideGfxVersion -- Optional ROCm architecture override, for example "10.3.0" for some RX 6900 XT setups.
      hsaOverrideGfxVersion: ""
      # ollama.acceleration.amd.resourceName -- Optional AMD device plugin resource name, for example amd.com/gpu.
      resourceName: ""
    nvidia:
      # ollama.acceleration.nvidia.imageTag -- Recommended NVIDIA-compatible Ollama tag. Set ollama.image.tag explicitly to use it.
      imageTag: latest
      # ollama.acceleration.nvidia.resourceName -- Kubernetes resource exposed by the NVIDIA device plugin.
      resourceName: nvidia.com/gpu
      visibleDevices: all
      driverCapabilities: compute,utility
  resources: {}
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  livenessProbe:
    httpGet:
      path: /api/tags
      port: http
    initialDelaySeconds: 30
    periodSeconds: 30
  readinessProbe:
    httpGet:
      path: /api/tags
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10

mongodb:
  # mongodb.enabled -- Deploy an in-cluster MongoDB for local/small installs. Disable to use an external MongoDB URI.
  enabled: true
  image:
    repository: mongo
    tag: "8.2.2"
    pullPolicy: IfNotPresent
  database: logarift
  external:
    uri: ""
    existingSecret: ""
    existingSecretKey: uri
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: ""
    accessModes: ["ReadWriteOnce"]
  resources: {}
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []

valkey:
  # valkey.enabled -- Deploy in-cluster Valkey Streams. Disable to use an external Valkey/Redis URL or to disable async queue dispatch.
  enabled: true
  image:
    repository: valkey/valkey
    tag: "9.1.0-alpine"
    pullPolicy: IfNotPresent
  external:
    url: ""
    existingSecret: ""
    existingSecretKey: url
  stream: logarift:llm_enrichment_jobs
  group: logarift-backend
  consumer: backend-1
  persistence:
    enabled: true
    size: 2Gi
    storageClassName: ""
    accessModes: ["ReadWriteOnce"]
  resources: {}
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []

gateway:
  # gateway.enabled -- Expose Logarift with Gateway API resources instead of legacy Ingress.
  enabled: false
  # gateway.create -- Create a Gateway in this release. Set false to attach the HTTPRoute to an existing Gateway.
  create: false
  # gateway.name -- Existing or chart-managed Gateway name. Empty defaults to the release fullname when gateway.create=true.
  name: ""
  # gateway.namespace -- Optional Gateway namespace for cross-namespace HTTPRoute attachment. Empty uses the release namespace.
  namespace: ""
  # gateway.className -- GatewayClass name. Required when gateway.create=true.
  className: ""
  annotations: {}
  labels: {}
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: logarift.local

httpRoute:
  annotations: {}
  labels: {}
  # httpRoute.parentRefs -- Explicit Gateway parentRefs. Defaults to gateway.name or the release fullname.
  parentRefs: []
  hostnames:  []
  rules:
    - service: backend
      matches:
        - path:
            type: PathPrefix
            value: /api
    - service: backend
      matches:
        - path:
            type: PathPrefix
            value: /health
    - service: backend
      matches:
        - path:
            type: PathPrefix
            value: /uploads
    - service: frontend
      matches:
        - path:
            type: PathPrefix
            value: /
