# nameOverride -- Override the chart name.
nameOverride: ""
# fullnameOverride -- Override the fully qualified release name.
fullnameOverride: ""

# imagePullSecrets -- Optional image pull secrets for private registries.
imagePullSecrets: []

# clusterDomain -- Kubernetes cluster DNS domain used for default in-cluster service URLs.
clusterDomain: cluster.local

serviceAccount:
  # serviceAccount.create -- Create a dedicated service account.
  create: true
  # serviceAccount.name -- Existing service account name when create=false.
  name: ""
  # serviceAccount.annotations -- Extra service account annotations.
  annotations: {}

podSecurityContext: {}

# securityContext -- App container security defaults. Dropping all Linux capabilities is safe for Logarift app containers because they run on unprivileged ports and do not need kernel-level privileges.
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: false

backend:
  replicaCount: 1
  image:
    repository: ghcr.io/mistervvp/logarift-api
    tag: "latest"
    digest: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  env: {}
  extraEnv: []
  resources: {}
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  persistence:
    uploads:
      enabled: true
      size: 5Gi
      storageClassName: ""
      accessModes: ["ReadWriteOnce"]
    exports:
      enabled: true
      size: 1Gi
      storageClassName: ""
      accessModes: ["ReadWriteOnce"]
  livenessProbe:
    httpGet:
      path: /health/live
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /health/ready
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
  podDisruptionBudget:
    enabled: false
    minAvailable: 1

frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/mistervvp/logarift-frontend
    tag: "latest"
    digest: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 5173
  # frontend.apiBaseURL -- Browser-facing API base URL. Empty uses same origin, useful behind one Gateway API host.
  apiBaseURL: ""
  env: {}
  extraEnv: []
  resources: {}
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10

mathEngine:
  replicaCount: 1
  image:
    repository: ghcr.io/mistervvp/logarift-math-engine
    tag: "latest"
    digest: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8090
  env: {}
  extraEnv: []
  resources: {}
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  livenessProbe:
    httpGet:
      path: /health/live
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /health/ready
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10

llmAdapter:
  # llmAdapter.enabled -- Enable backend LLM enrichment integration.
  enabled: false
  # llmAdapter.deploy -- Deploy the adapter in this release. Set false with backendURL for an existing in-cluster adapter service.
  deploy: true
  replicaCount: 1
  image:
    repository: ghcr.io/mistervvp/logarift-llm-adapter
    tag: "latest"
    digest: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8091
  # backendURL -- Backend-facing adapter URL. Empty uses the chart-managed Service DNS name in the release namespace.
  backendURL: ""
  # ollamaURL -- Adapter-facing Ollama-compatible runtime URL. Use a Service DNS name for an in-cluster runtime.
  ollamaURL: http://ollama:11434
  model: qwen3:8b
  timeoutMS: 15000
  minConfidence: "0.70"
  promptPrivacyMode: text_only
  allowRemoteRuntime: false
  env: {}
  extraEnv: []
  resources: {}
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []

mongodb:
  # mongodb.enabled -- Deploy an in-cluster MongoDB for local/small installs. Disable to use an external MongoDB URI.
  enabled: true
  image:
    repository: mongo
    tag: "8.2.2"
    pullPolicy: IfNotPresent
  database: logarift
  external:
    uri: ""
    existingSecret: ""
    existingSecretKey: uri
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: ""
    accessModes: ["ReadWriteOnce"]
  resources: {}
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []

valkey:
  # valkey.enabled -- Deploy in-cluster Valkey Streams. Disable to use an external Valkey/Redis URL or to disable async queue dispatch.
  enabled: true
  image:
    repository: valkey/valkey
    tag: "9.1.0-alpine"
    pullPolicy: IfNotPresent
  external:
    url: ""
    existingSecret: ""
    existingSecretKey: url
  stream: logarift:llm_enrichment_jobs
  group: logarift-backend
  consumer: backend-1
  persistence:
    enabled: true
    size: 2Gi
    storageClassName: ""
    accessModes: ["ReadWriteOnce"]
  resources: {}
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []

gateway:
  # gateway.enabled -- Expose Logarift with Gateway API resources instead of legacy Ingress.
  enabled: false
  # gateway.create -- Create a Gateway in this release. Set false to attach the HTTPRoute to an existing Gateway.
  create: false
  # gateway.name -- Existing or chart-managed Gateway name. Empty defaults to the release fullname when gateway.create=true.
  name: ""
  # gateway.namespace -- Optional Gateway namespace for cross-namespace HTTPRoute attachment. Empty uses the release namespace.
  namespace: ""
  # gateway.className -- GatewayClass name. Required when gateway.create=true.
  className: ""
  annotations: {}
  labels: {}
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: logarift.local

httpRoute:
  annotations: {}
  labels: {}
  # httpRoute.parentRefs -- Explicit Gateway parentRefs. Defaults to gateway.name or the release fullname.
  parentRefs: []
  hostnames:  []
  rules:
    - service: backend
      matches:
        - path:
            type: PathPrefix
            value: /api
    - service: backend
      matches:
        - path:
            type: PathPrefix
            value: /health
    - service: backend
      matches:
        - path:
            type: PathPrefix
            value: /uploads
    - service: frontend
      matches:
        - path:
            type: PathPrefix
            value: /
