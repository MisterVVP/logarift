services:
  mongodb:
    image: mongo:8.3.2
    container_name: logarift-mongodb
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - logarift_mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  math-engine:
    build:
      context: .
      dockerfile: math-engine/Dockerfile
    container_name: logarift-math-engine
    restart: unless-stopped
    environment:
      LOGARIFT_MATH_ENGINE_PORT: 8090
    ports:
      - "127.0.0.1:8090:8090"


  llm-adapter:
    build:
      context: .
      dockerfile: llm-adapter/Dockerfile
    container_name: logarift-llm-adapter
    restart: unless-stopped
    environment:
      LOGARIFT_LLM_ADAPTER_HOST: 0.0.0.0
      LOGARIFT_LLM_ADAPTER_PORT: 8091
      LOGARIFT_LLM_RUNTIME_URL: ${LOGARIFT_LLM_RUNTIME_URL:-http://host.docker.internal:11434}
      LOGARIFT_LLM_ADAPTER_ALLOW_REMOTE_RUNTIME: ${LOGARIFT_LLM_ADAPTER_ALLOW_REMOTE_RUNTIME:-false}
      LOGARIFT_LLM_MODEL: ${LOGARIFT_LLM_MODEL:-qwen3.6}
      LOGARIFT_LLM_REQUEST_TIMEOUT_MS: ${LOGARIFT_LLM_REQUEST_TIMEOUT_MS:-15000}
      LOGARIFT_LLM_MAX_INPUT_CHARS: ${LOGARIFT_LLM_MAX_INPUT_CHARS:-12000}
      LOGARIFT_LLM_MAX_PROMPT_TOKENS: ${LOGARIFT_LLM_MAX_PROMPT_TOKENS:-8192}
      LOGARIFT_LLM_TRUNCATION_STRATEGY: head_tail
      LOGARIFT_LLM_LOG_PROMPTS: "false"
      LOGARIFT_LLM_LOG_RESPONSES: "false"
    ports:
      - "127.0.0.1:8091:8091"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: logarift-backend
    restart: unless-stopped
    environment:
      LOGARIFT_API_HOST: 0.0.0.0
      LOGARIFT_API_PORT: 8080
      LOGARIFT_MONGODB_URI: mongodb://mongodb:27017
      LOGARIFT_MONGODB_DATABASE: logarift
      LOGARIFT_MATH_ENGINE_URL: http://math-engine:8090
      LOGARIFT_EXPORT_DIR: /var/lib/logarift/exports
      LOGARIFT_UPLOAD_DIR: /var/lib/logarift/uploads
      LOGARIFT_READINESS_TIMEOUT_MS: 10000
      LOGARIFT_SHUTDOWN_TIMEOUT_MS: 5000
      LOGARIFT_LLM_ADAPTER_ENABLED: ${LOGARIFT_LLM_ADAPTER_ENABLED:-false}
      LOGARIFT_LLM_ADAPTER_URL: http://llm-adapter:8091
      LOGARIFT_LLM_ADAPTER_TIMEOUT_MS: ${LOGARIFT_LLM_ADAPTER_TIMEOUT_MS:-15000}
      LOGARIFT_LLM_ADAPTER_MIN_CONFIDENCE: ${LOGARIFT_LLM_ADAPTER_MIN_CONFIDENCE:-0.70}
      LOGARIFT_LLM_ADAPTER_PROMPT_PRIVACY_MODE: ${LOGARIFT_LLM_ADAPTER_PROMPT_PRIVACY_MODE:-text_only}
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - logarift_uploads:/var/lib/logarift/uploads
    depends_on:
      mongodb:
        condition: service_healthy
      math-engine:
        condition: service_started
      llm-adapter:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: logarift-frontend
    restart: unless-stopped
    environment:
      VITE_LOGARIFT_API_BASE_URL: http://localhost:8080
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      - backend

volumes:
  logarift_mongodb_data:
  logarift_uploads:
